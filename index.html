<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RESONA GeoTech Board</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./styles.css?v=global-first-immersive-1" />
    <script>
      window.RESONA_CONFIG = {
        gaMeasurementId: "__GA_MEASUREMENT_ID__",
      };
      (function () {
        var measurementId = window.RESONA_CONFIG.gaMeasurementId;
        if (!/^G-[A-Z0-9]+$/.test(measurementId)) return;
        window.dataLayer = window.dataLayer || [];
        window.gtag = function () {
          window.dataLayer.push(arguments);
        };
        window.gtag("js", new Date());
        window.gtag("config", measurementId, { send_page_view: false });

        var script = document.createElement("script");
        script.async = true;
        script.src = "https://www.googletagmanager.com/gtag/js?id=" + encodeURIComponent(measurementId);
        document.head.appendChild(script);
      })();
    </script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="#/">
          <span class="brand-mark">R</span>
          <span>
            <strong>RESONA GeoTech Board</strong>
            <small>Future observation interface</small>
          </span>
        </a>
        <nav class="nav" aria-label="Primary navigation">
          <a href="#/">Observatory</a>
          <a href="#/themes">Themes</a>
          <a href="#/map">Map</a>
          <a href="#/archive">Archive</a>
          <a href="#/studio">Studio</a>
          <a href="#/premium">Premium</a>
        </nav>
      </header>

      <main id="app"></main>

      <footer class="footer">
        <span>RESONA GeoTech Board</span>
        <span>Future observation interface</span>
      </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./app.js?v=global-first-immersive-1"></script>
  </body>
</html>
